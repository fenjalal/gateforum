<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/fonts.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="alternate" type="application/rss+xml" title="GateForum RSS" href="/feed.xml">
</head>
<body>
<div class="site-wrap">
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ url_for('index') }}" class="site-logo">
       <svg width="20" height="20" viewBox="0 0 20 20"><path fill="currentColor" d="M15 2H5L4 8h12zM0 10s2 1 10 1s10-1 10-1l-4-2H4zm8 4h4v1H8z"/><circle cx="6" cy="15" r="3" fill="currentColor"/><circle cx="14" cy="15" r="3" fill="currentColor"/></svg>
        <span class="die">{{ site_title.split()[0] if site_title else 'Die' }}</span>{{ site_title.split()[1] if site_title.split()|length > 1 else 'Net' }}
      </a>
      <form class="header-search" method="GET" action="{{ url_for('search') }}">
        <input type="text" name="q" placeholder="Search…" maxlength="200" autocomplete="off" class="hs-input">
        <button type="submit" class="hs-btn" title="Search">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" width="13" height="13">
            <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
          </svg>
        </button>
      </form>
    </div>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer class="site-footer">
  ©2026 GateForum

  <div class="footer-line">
    <span class="wallet-title">Join Now</span>
    <span class="wallet-address">
    GateForum Core
    </span>
  </div>

</footer>
</div>
</body>
</html>
